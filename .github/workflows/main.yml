name: Frontend CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  type-check-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: List project files (Debug)
        run: ls -R apps/cevent_frontend || echo "Directory not found"

      - name: Install dependencies
        working-directory: apps/cevent_frontend
        run: npm install

      - name: Check TypeScript types
        working-directory: apps/cevent_frontend
        run: npx tsc --noEmit

      - name: Run Prettier to check formatting
        working-directory: apps/cevent_frontend
        run: npx prettier --check 'src/**/*.{ts,tsx,js,json}'

      - name: Run ESLint to check code quality
        working-directory: apps/cevent_frontend
        run: npx eslint 'src/**/*.{ts,tsx,js}'
